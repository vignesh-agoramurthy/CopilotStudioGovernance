name: Deploy Documentation
on:
  push:
    branches:
      - main
    paths:
      - 'apps/documentation/**'
  workflow_dispatch:


permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

jobs:
  # This job checks if the 'documentation' environment exists
  get-environments:
    name: Get Environments
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      actions: read
    outputs:
      names: ${{ steps.set_env.outputs.names }}
    steps:
      - name: Get environments
        uses: octokit/request-action@b91aabaa861c777dcdb14e2387e30eddf04619ae # v3.0.0
        id: get_env
        with:
          route: GET /repos/${{ github.repository }}/environments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set output
        id: set_env
        # This step filters for the 'documentation' environment from the list of environments
        run: |
          names=$(echo "$NAMES" | jq -c '[.[] | select(. == "documentation")]')
          echo "Filtered environments: $names"
          echo "names=$names" >> $GITHUB_OUTPUT
        env:
          NAMES: ${{ toJson(fromJson(steps.get_env.outputs.data).environments.*.name) }}

  deploy:
    # If there are no documentation environment to deploy to, this job will be skipped
    if: ${{ needs.get-environments.outputs.names != '[]'}}
    name: Deploy Documentation
    needs: get-environments
    runs-on: ubuntu-latest
    environment:
      name: documentation
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
